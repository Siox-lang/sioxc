[package]
name = "siox-llvm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
siox-ir.workspace = true
# inkwell is optional and behind the `llvm` feature: the default workspace
# build (and the interpreter oracle) never needs an LLVM toolchain. Pinned to
# the local LLVM (22); bump the feature to match your `llvm-config`.
inkwell = { version = "0.9.0", default-features = false, features = ["llvm22-1"], optional = true }

[features]
default = []
llvm = ["dep:inkwell"]

[dev-dependencies]
# Frontend + interpreter, to build real Designs and differential-test the
# JIT against the interpreter oracle (the seed of stage B4).
siox-diag.workspace = true
siox-syntax.workspace = true
siox-resolve.workspace = true
siox-types.workspace = true
siox-elab.workspace = true
siox-sim.workspace = true

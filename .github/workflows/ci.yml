name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # inkwell/llvm-sys locate the toolchain here (LLVM 22, the pinned version).
  LLVM_SYS_221_PREFIX: /usr/lib/llvm-22

jobs:
  test:
    name: build + test (LLVM backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 22
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y llvm-22-dev libpolly-22-dev
          echo "/usr/lib/llvm-22/bin" >> "$GITHUB_PATH"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      # The frontend must still build without an LLVM toolchain (contributors
      # who only touch the parser/checker), so verify that too.
      - name: Build (frontend only, no LLVM)
        run: cargo build --workspace --no-default-features

      - name: Build (LLVM backend)
        run: cargo build --workspace

      - name: Test (LLVM backend)
        run: cargo test --workspace

      # The runnable `.siox` corpus lives in a sibling repo; check it out and
      # run every program through the freshly-built compiler, so a regression
      # here fails this build.
      - name: Check out the conformance corpus
        uses: actions/checkout@v4
        with:
          repository: Siox-lang/siox-tests
          path: siox-tests

      - name: Check the conformance corpus compiles cleanly
        run: |
          # File reads (fs_test's rom.bin / banner.txt) resolve relative to each
          # program's own directory, so no need to run from inside the corpus.
          fail=0
          for f in siox-tests/*.siox; do
            echo "== $f =="
            if ! cargo run -q --bin sioxc -- check "$f" --std std; then
              echo "::error file=$f::check failed"
              fail=1
            fi
          done
          exit $fail
